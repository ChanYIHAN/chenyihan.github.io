<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 作品集管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent-hover: #9585ff;
      --text: #e8eaf0;
      --text-muted: #8b8fa8;
      --error: #f87171;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景光晕 */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,179,237,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #63b3ed);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }
    .form-group input::placeholder {
      color: #4a4d61;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #63b3ed);
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--error);
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #3a3d52;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">✦</div>
      <h1>作品集管理后台</h1>
      <p>陈奕翰 · 个人简历管理系统</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      <div class="error-msg" id="errorMsg">用户名或密码错误，请重试</div>
    </form>

    <div class="login-footer">仅限管理员访问</div>
  </div>

  <script src="config.js"></script>
  <script>
    // 检查是否已登录
    if (sessionStorage.getItem('admin_logged_in') === 'true') {
      location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = '登录中...';
      err.classList.remove('show');

      // 简单验证（生产环境建议使用 Supabase Auth）
      setTimeout(() => {
        if (username === ADMIN_CONFIG.username && password === ADMIN_CONFIG.password) {
          sessionStorage.setItem('admin_logged_in', 'true');
          sessionStorage.setItem('admin_user', username);
          location.href = 'index.html';
        } else {
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      }, 400);
    });

    // 回车提交
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
  </script>
</body>
</html>
